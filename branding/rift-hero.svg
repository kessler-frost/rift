<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e1219"/>
      <stop offset="1" stop-color="#05070b"/>
    </linearGradient>
    <linearGradient id="seam" x1="0" y1="0" x2="0" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fde68a"/><stop offset="0.5" stop-color="#fbbf24"/><stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="panelL" x1="0" y1="80" x2="0" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#303c50"/><stop offset="1" stop-color="#1d2634"/>
    </linearGradient>
    <linearGradient id="panelR" x1="0" y1="80" x2="0" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#28323f"/><stop offset="1" stop-color="#161d29"/>
    </linearGradient>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gbig" x="-200%" y="-80%" width="500%" height="260%">
      <feGaussianBlur stdDeviation="46" result="b"/><feMerge><feMergeNode in="b"/></feMerge>
    </filter>
    <clipPath id="tile"><rect x="96" y="86" width="168" height="168" rx="40" ry="40"/></clipPath>
  </defs>

  <rect width="1280" height="340" fill="url(#bg)"/>
  <!-- faint full-height rift glow on the right third -->
  <g filter="url(#gbig)" opacity="0.18">
    <path d="M980,-40 L900,150 L1010,300 L920,400" stroke="url(#seam)" stroke-width="40" fill="none"/>
  </g>

  <!-- icon mark: same artwork as the app icon (branding/rift-icon.svg), scaled into the tile -->
  <svg x="92" y="82" width="176" height="176" viewBox="0 0 1024 1024">
    <defs>
      <linearGradient id="i_bg" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#0b0e14"/><stop offset="1" stop-color="#04060a"/>
      </linearGradient>
      <linearGradient id="i_panelL" x1="0" y1="120" x2="430" y2="1024" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#283242"/><stop offset="1" stop-color="#141a25"/>
      </linearGradient>
      <linearGradient id="i_panelR" x1="1024" y1="120" x2="620" y2="1024" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#212a39"/><stop offset="1" stop-color="#10151f"/>
      </linearGradient>
      <linearGradient id="i_seam" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#fde68a"/><stop offset="0.5" stop-color="#fbbf24"/><stop offset="1" stop-color="#f59e0b"/>
      </linearGradient>
      <filter id="i_glow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="30" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <radialGradient id="i_sheen" cx="0.3" cy="0.12" r="0.9" gradientUnits="objectBoundingBox">
        <stop offset="0" stop-color="#ffffff" stop-opacity="0.06"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
      </radialGradient>
      <clipPath id="i_tile"><rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"/></clipPath>
    </defs>
    <g clip-path="url(#i_tile)">
      <rect width="1024" height="1024" fill="url(#i_bg)"/>
      <g filter="url(#i_glow)">
        <path d="M566,-10 L470,330 L590,500 L452,720 L572,1034 L600,1034 L500,720 L636,500 L516,330 L612,-10 Z" fill="url(#i_seam)" opacity="0.9"/>
      </g>
      <path d="M-10,-10 L548,-10 L452,330 L572,500 L434,720 L554,1034 L-10,1034 Z" fill="url(#i_panelL)"/>
      <path d="M630,-10 L1034,-10 L1034,1034 L590,1034 L490,720 L654,500 L534,330 Z" fill="url(#i_panelR)"/>
      <path d="M580,-10 L484,330 L604,500 L466,720 L586,1034" stroke="#fffbeb" stroke-width="9" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
      <path d="M548,-10 L452,330 L572,500 L434,720 L554,1034" stroke="#fcd34d" stroke-width="4" stroke-linejoin="round" fill="none" opacity="0.5"/>
      <path d="M630,-10 L534,330 L654,500 L490,720 L590,1034" stroke="#fcd34d" stroke-width="4" stroke-linejoin="round" fill="none" opacity="0.5"/>
      <rect width="1024" height="1024" fill="url(#i_sheen)"/>
    </g>
  </svg>

  <!-- wordmark + tagline -->
  <text x="312" y="178" font-family="Helvetica, Arial, sans-serif" font-size="104" font-weight="700" fill="#eef1f6" letter-spacing="1">Rift</text>
  <text x="318" y="224" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#9aa4b6">A fast, fully-offline terminal. Warp with the cloud and AI stripped out.</text>
</svg>
