<svg width="520" height="160" viewBox="0 0 520 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="seam" x1="0" y1="0" x2="0" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="0.5" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="panelL" x1="0" y1="0" x2="0" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#283242"/><stop offset="1" stop-color="#141a25"/>
    </linearGradient>
    <linearGradient id="panelR" x1="0" y1="0" x2="0" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#212a39"/><stop offset="1" stop-color="#10151f"/>
    </linearGradient>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="tile"><rect x="8" y="16" width="128" height="128" rx="30" ry="30"/></clipPath>
  </defs>

  <!-- icon mark -->
  <g clip-path="url(#tile)">
    <rect x="8" y="16" width="128" height="128" fill="#0b0e14"/>
    <g filter="url(#g)"><path d="M78,10 L66,55 L80,72 L62,100 L78,150 L82,150 L70,100 L88,72 L74,55 L84,10 Z" fill="url(#seam)" opacity="0.9"/></g>
    <path d="M0,10 L76,10 L64,55 L78,72 L60,100 L76,150 L0,150 Z" fill="url(#panelL)"/>
    <path d="M86,10 L150,10 L150,150 L82,150 L68,100 L86,72 L72,55 Z" fill="url(#panelR)"/>
    <path d="M80,10 L68,55 L82,72 L64,100 L80,150" stroke="#fffbeb" stroke-width="2.4" fill="none" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="168" y="104" font-family="Helvetica, Arial, sans-serif" font-size="84" font-weight="700" fill="#e8ecf3" letter-spacing="1">Rift</text>
</svg>
