---
name: "Run Rift locally with shell"
command: "RIFT_SHELL_PATH={{shell}} cargo run"
description: "Runs rift with the particular shell so devs don't need to change their login shell to test a different shell locally"
arguments:
  - name: shell
    description: path of shell to use
author: Rift Team
shells: []
